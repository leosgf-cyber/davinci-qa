name: Daily Q&A Generator

on:
  # Scheduled runs paused — uncomment to re-enable automated daily deploys
  # schedule:
  #   - cron: '0 11 * * *'   # 7 AM EDT (UTC-4) / 6 AM EST in winter
  workflow_dispatch:         # manual "Run workflow" button only

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html history.json archive/
          git diff --cached --quiet || git commit -m "chore: daily Q&A $(date -u +%Y-%m-%d)"
          git push
